name: CI with ServiceNow Integration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-report:
    name: Test and Report
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create test file
        run: echo "Hello UJJWAL" > test.txt

      - name: Run Unit Test
        id: run-test
        run: |
          TEST_STATUS=0
          mkdir -p target/surefire-reports

          if grep -q "UJJWAL" test.txt; then
            echo "Test Passed"
            echo '<?xml version="1.0" encoding="UTF-8"?><testsuite name="TextCheckSuite" tests="4" failures="0" errors="0"><testcase classname="TextCheck" name="ContainsUJJWAL"/></testsuite>' > target/surefire-reports/testng-results.xml
          else
            echo "Test Failed"
            echo '<?xml version="1.0" encoding="UTF-8"?><testsuite name="TextCheckSuite" tests="4" failures="1" errors="0"><testcase classname="TextCheck" name="ContainsUJJWAL"><failure message="Text not found"/></testcase></testsuite>' > target/surefire-reports/testng-results.xml
            TEST_STATUS=1
          fi

          echo "test_status=$TEST_STATUS" >> $GITHUB_OUTPUT

      - name: Send Test Result to ServiceNow
        uses: ServiceNow/servicenow-devops-test-report@v6.0.0
        with:
          devops-integration-user-name: ${{ secrets.SN_DEVOPS_USER }}
          devops-integration-user-password: ${{ secrets.SN_DEVOPS_PASSWORD }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Test and Report'
          xml-report-filename: target/surefire-reports/testng-results.xml
          test-summary-name: 'Text Validation Test'

      - name: Fail if test failed
        if: steps.run-test.outputs.test_status == '1'
        run: exit 1


  create-change:
    name: Create Change in ServiceNow
    needs: test-and-report
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: ServiceNow Change
        id: create
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-user-name: ${{ secrets.SN_DEVOPS_USER }}
          devops-integration-user-password: ${{ secrets.SN_DEVOPS_PASSWORD }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Create Change in ServiceNow'
          change-request: '{"setCloseCode":"true","change_model":"DevOps","autoCloseChange":true,"attributes":{"category":"DevOps","short_description":"Ujjwal Automated Software Deployment","description":"Automated Software Deployment.","assignment_group":"a7291a2e9377aa1088adfc532bba10ea","implementation_plan":"Software update is tested and results can be found in Test Summaries Tab; When the change is approved the implementation happens automated by the CICD pipeline within the change planned start and end time window.","backout_plan":"When software fails in production, the previous software release will be re-deployed.","test_plan":"Testing if the software was successfully deployed"}}'          interval: '100'
          timeout: '3600'
          changeCreationTimeOut: '3600'
          abortOnChangeCreationFailure: true
          abortOnChangeStepTimeout: true

      - name: Show Change Number
        run: echo "Created Change Request = ${{ steps.create.outputs.change-request-number }}"



