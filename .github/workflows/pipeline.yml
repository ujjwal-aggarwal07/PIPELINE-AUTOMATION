# pipline for unit test ans sending result
name: My First Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-send:
    name: Test and Send to ServiceNow
    runs-on: ubuntu-latest
    environment: test   # GitHub environment with secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create test text file
        run: echo "Hello UJJWAL" > test.txt

      - name: Run Unit Test
        id: run-test
        run: |
          # Initialize test status
          TEST_STATUS=0

          # Run simple test
          if grep -q "UJJWAL" test.txt; then
            echo "Test Passed"
            # Generate ServiceNow-compatible XML (JUnit/TestNG style)
            mkdir -p target/surefire-reports
            echo '<?xml version="1.0" encoding="UTF-8"?>
<testsuite name="TextCheckSuite" tests="1" failures="0" errors="0">
  <testcase classname="TextCheck" name="ContainsUJJWAL"/>
</testsuite>' > target/surefire-reports/testng-results.xml
          else
            echo "Test Failed"
            mkdir -p target/surefire-reports
            echo '<?xml version="1.0" encoding="UTF-8"?>
<testsuite name="TextCheckSuite" tests="1" failures="1" errors="0">
  <testcase classname="TextCheck" name="ContainsUJJWAL" failures="1"/>
</testsuite>' > target/surefire-reports/testng-results.xml
            TEST_STATUS=1
          fi

          # Save test status for later step
          echo "test_status=$TEST_STATUS" >> $GITHUB_OUTPUT

      - name: Send Test Result to ServiceNow
        uses: ServiceNow/servicenow-devops-test-report@v6.0.0
        with:
          devops-integration-user-name: ${{ secrets.SN_DEVOPS_USER }}
          devops-integration-user-password: ${{ secrets.SN_DEVOPS_PASSWORD }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'test-and-send'
          xml-report-filename: target/surefire-reports/testng-results.xml
          test-summary-name: 'Text Validation Test'

      - name: Fail Workflow if Test Failed
        if: steps.run-test.outputs.test_status == '1'
        run: |
          echo "Failing the workflow because the test failed."
          exit 1


      - name: Fail Workflow if Test Failed
        if: steps.run-test.outputs.test_status == '1'
        run: |
          echo "Failing the workflow because the test failed."
          exit 1
