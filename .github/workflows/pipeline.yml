name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-job:
    name: Test Job
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Pipeline is running because you pushed to main"

  deploy:
    name: Deploy
    needs: test-job
    runs-on: ubuntu-latest
    environment: test        # Your GitHub Environment name

    steps:
      - name: ServiceNow Change
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-user-name: ${{ secrets.SN_DEVOPS_USER }}
          devops-integration-user-password: ${{ secrets.SN_DEVOPS_PASSWORD }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Deploy'

          change-request: >
            {
              "setCloseCode": "true",
              "autoCloseChange": true,
              "change_model": "adffaa9e4370211072b7f6be5bb8f2ed",
              "attributes": {
                "short_description": "Automated Software Deployment from GitHub",
                "description": "Change request created automatically from GitHub Actions pipeline.",
                "assignment_group": "a715cd759f2002002920bde8132e7018",
                "implementation_plan": "Deployment executed automatically using CI/CD pipeline.",
                "backout_plan": "Rollback to previous stable version if any issue occurs.",
                "test_plan": "All pipeline tests executed successfully before deployment."
              }
            }

          interval: '100'
          timeout: '3600'
          changeCreationTimeOut: '3600'
          abortOnChangeCreationFailure: true
          abortOnChangeStepTimeout: true

      - name: Output Status
        run: echo "ServiceNow Change Request process completed"

