# pipline for unit test ans sending result

name: My First Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger

jobs:
  test-job:
    name: Test Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create test text file
        run: |
          echo "Hello UJJWAL" > test.txt

      - name: Run Unit Test
        run: |
          if grep -q "UJJWAL" test.txt; then
            echo "Test Passed"
            echo '<?xml version="1.0" encoding="UTF-8"?><testsuite><testcase classname="TextCheck" name="ContainsUJJWAL"/></testsuite>' > test-results.xml
          else
            echo "Test Failed"
            echo '<?xml version="1.0" encoding="UTF-8"?><testsuite><testcase classname="TextCheck" name="ContainsUJJWAL" failures="1"/></testsuite>' > test-results.xml
            exit 1
          fi

  send-to-servicenow:
    name: Send Unit Test to ServiceNow
    needs: test-job
    runs-on: ubuntu-latest
    environment: test   # GitHub environment with secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Send Test Result to ServiceNow
        uses: ServiceNow/servicenow-devops-test-report@v6.0.0
        with:
          devops-integration-user-name: ${{ secrets.SN_DEVOPS_USER }}
          devops-integration-user-password: ${{ secrets.SN_DEVOPS_PASSWORD }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Test Job'
          xml-report-filename: test-results.xml
          test-summary-name: 'Text Validation Test'
